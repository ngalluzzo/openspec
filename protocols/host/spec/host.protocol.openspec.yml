openspec: "1.0"
kind: protocol-declaration
id: openspec.host.v1
package:
  id: "@openspec/host"
documentModels:
  - model:HostDocument
validation:
  - id: host.validation
    rules:
      - id: owner-format
        scope: document
        when:
          $expr:
            ===:
              - var: document.protocol
              - openspec.host.v1
        assert:
          $expr:
            regex_test:
              - var: document.document.owner
              - ^[a-z][a-z0-9]*(\.[a-z][a-z0-9]*)*:.+$
        code: host.owner.invalid
        message: Host documents must declare a canonical owner nodeId.
        details:
          $expr:
            os_object:
              - owner:
                  var:
                    - document.document.owner
                    - null

      - id: has-dispatches
        scope: selector
        selector: host.methodDispatches
        assert:
          $expr:
            var:
              - result.0
              - null
        code: host.dispatches.empty
        message: Host documents must declare at least one method dispatch.
