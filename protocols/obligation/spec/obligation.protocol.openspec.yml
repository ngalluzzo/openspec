openspec: "1.0"
kind: protocol-declaration
id: openspec.obligation.v1
package:
  id: "@openspec/obligation"
documentModels:
  - model:ObligationDocument
validation:
  - id: obligation.validation
    rules:
      - id: owner-format
        scope: document
        when:
          $expr:
            ===:
              - var: document.protocol
              - openspec.obligation.v1
        assert:
          $expr:
            regex_test:
              - var: document.document.owner
              - ^[a-z][a-z0-9]*(\.[a-z][a-z0-9]*)*:.+$
        code: obligation.owner.invalid
        message: Obligation documents must declare a canonical owner nodeId.
        details:
          $expr:
            os_object:
              - owner:
                  var:
                    - document.document.owner
                    - null

      - id: has-obligations
        scope: selector
        selector: obligation.all
        assert:
          $expr:
            var:
              - result.0
              - null
        code: obligation.declarations.empty
        message: Obligation documents must declare at least one obligation.

      - id: obligation-id-format
        scope: selector
        selector: obligation.all
        forEach: true
        assert:
          $expr:
            regex_test:
              - var: item.id
              - ^[a-z][a-z0-9]*(\.[a-z0-9-]+)*$
        code: obligation.id.invalid
        message: >
          Obligation ids must be lowercase namespaced identifiers
          (e.g. order.has-line-items, user.owns-resource).
        details:
          $expr:
            os_object:
              - id:
                  var: item.id
