openspec: "1.0"
kind: protocol-declaration
id: openspec.facet.v1
package:
  id: "@openspec/facet"
documentModels:
  - model:FacetDocument
validation:
  - id: facet.validation
    rules:
      - id: owner-format
        scope: document
        when:
          $expr:
            ===:
              - var: document.protocol
              - openspec.facet.v1
        assert:
          $expr:
            regex_test:
              - var: document.document.owner
              - ^[a-z][a-z0-9]*(\.[a-z][a-z0-9]*)*:.+$
        code: facet.owner.invalid
        message: Facet documents must declare a canonical owner nodeId.
        details:
          $expr:
            os_object:
              - owner:
                  var:
                    - document.document.owner
                    - null

      - id: has-facets
        scope: selector
        selector: facet.all
        assert:
          $expr:
            var:
              - result.0
              - null
        code: facet.declarations.empty
        message: Facet documents must declare at least one facet.

      - id: facet-id-format
        scope: selector
        selector: facet.all
        forEach: true
        assert:
          $expr:
            regex_test:
              - var: item.id
              - ^[a-z][a-z0-9]*(\.[a-z0-9-]+)+:.+$
        code: facet.id.invalid
        message: Facet ids must be canonical fact ids.
        details:
          $expr:
            os_object:
              - facet:
                  var: item.id

      - id: facet-target-format
        scope: selector
        selector: facet.all
        forEach: true
        assert:
          $expr:
            regex_test:
              - var: item.target
              - ^[a-z][a-z0-9]*(\.[a-z][a-z0-9]*)*:.+$
        code: facet.target.invalid
        message: Facet targets must be canonical nodeIds.
        details:
          $expr:
            os_object:
              - facet:
                  var: item.id
                target:
                  var: item.target

      - id: facet-kind-format
        scope: selector
        selector: facet.all
        forEach: true
        assert:
          $expr:
            regex_test:
              - var: item.kind
              - ^[a-z][a-z0-9]*(\.[a-z0-9-]+)+$
        code: facet.kind.invalid
        message: Facet kinds must be lowercase namespaced identifiers.
        details:
          $expr:
            os_object:
              - facet:
                  var: item.id
                kind:
                  var: item.kind
