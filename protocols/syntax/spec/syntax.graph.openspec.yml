          paramsContract:
            kind: model
            model: model:SyntaxSelectorNoParams
          returnsContract:
            kind: model
            model: model:SyntaxInvalidUnitLinksSelectorResult

        - id: syntax.invalidReferenceUnitLinks
          sources:
            reference:
              kind: nodes
              filter:
                kind:
                  $expr: syntax.reference
            unit:
              kind: nodes
              optional: true
              filter:
                id:
                  $expr:
                    var: row.reference.attributes.unitNodeId
                kind:
                  $expr: syntax.unit
          where:
            $expr:
              "!":
