openspec: "1.0"
documents:
  - id: syntax.graph
    protocol: openspec.graph.v1
    document:
      subject: openspec.syntax.v1
      owner: protocol.protocol:openspec.syntax.v1
      lowering:
        - id: syntax.units
          source:
            path: units
            as: unit
            optional: true
          facts:
            - kind: node
              id:
                $expr:
                  os_node_id:
                    - syntax.unit
                    - var: document.namespace
                    - var: unit.id
              factKind:
                $expr: syntax.unit
              attributes:
                $expr:
                  os_object:
                    - nodeId:
                        os_node_id:
                          - syntax.unit
                          - var: document.namespace
                          - var: unit.id
                      id:
                        var: unit.id
                      namespace:
                        var: document.namespace
                      owner:
                        var: document.owner
                      kind:
                        var: unit.kind
                      asset:
                        var:
                          - unit.asset
                          - null
                      subject:
                        var:
                          - unit.subject
                          - null
                      role:
                        var:
                          - unit.role
                          - null
                      metadata:
                        var:
                          - unit.metadata
                          - null

        - id: syntax.symbols
          source:
            path: symbols
            as: symbol
            optional: true
          facts:
            - kind: node
              id:
                $expr:
                  os_node_id:
                    - syntax.symbol
                    - var: document.namespace
                    - var: symbol.id
              factKind:
                $expr: syntax.symbol
              attributes:
                $expr:
                  os_object:
                    - nodeId:
                        os_node_id:
                          - syntax.symbol
                          - var: document.namespace
                          - var: symbol.id
                      id:
                        var: symbol.id
                      unit:
                        var: symbol.unit
                      unitNodeId:
                        os_node_id:
                          - syntax.unit
                          - var: document.namespace
                          - var: symbol.unit
                      namespace:
                        var: document.namespace
                      owner:
                        var: document.owner
                      kind:
                        var: symbol.kind
                      name:
                        var: symbol.name
                      target:
                        var:
                          - symbol.target
                          - null
                      role:
                        var:
                          - symbol.role
                          - null
                      order:
                        var:
                          - symbol.order
                          - null
                      metadata:
                        var:
                          - symbol.metadata
                          - null
            - kind: edge
              id:
                $expr:
                  cat:
                    - os_node_id:
                        - syntax.unit
                        - var: document.namespace
                        - var: symbol.unit
                    - .symbol.
                    - var: symbol.id
              factKind:
                $expr: syntax.unit.symbol
              from:
                $expr:
                  os_node_id:
                    - syntax.unit
                    - var: document.namespace
                    - var: symbol.unit
              to:
                $expr:
                  os_node_id:
                    - syntax.symbol
                    - var: document.namespace
                    - var: symbol.id

        - id: syntax.slots
          source:
            path: slots
            as: slot
            optional: true
          facts:
            - kind: node
              id:
                $expr:
                  os_node_id:
                    - syntax.slot
                    - var: document.namespace
                    - var: slot.id
              factKind:
                $expr: syntax.slot
              attributes:
                $expr:
                  os_object:
                    - nodeId:
                        os_node_id:
                          - syntax.slot
                          - var: document.namespace
                          - var: slot.id
                      id:
                        var: slot.id
                      unit:
                        var: slot.unit
                      unitNodeId:
                        os_node_id:
                          - syntax.unit
                          - var: document.namespace
                          - var: slot.unit
                      namespace:
                        var: document.namespace
                      owner:
                        var: document.owner
                      kind:
                        var: slot.kind
                      target:
                        var:
                          - slot.target
                          - null
                      symbol:
                        var:
                          - slot.symbol
                          - null
                      role:
                        var:
                          - slot.role
                          - null
                      order:
                        var:
                          - slot.order
                          - null
                      metadata:
                        var:
                          - slot.metadata
                          - null
            - kind: edge
              id:
                $expr:
