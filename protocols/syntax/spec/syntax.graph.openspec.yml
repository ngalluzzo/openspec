                    - os_node_id:
                        - syntax.unit
                        - var: document.namespace
                        - var: slot.unit
                    - .slot.
                    - var: slot.id
              factKind:
                $expr: syntax.unit.slot
              from:
                $expr:
                  os_node_id:
                    - syntax.unit
                    - var: document.namespace
                    - var: slot.unit
              to:
                $expr:
                  os_node_id:
                    - syntax.slot
                    - var: document.namespace
                    - var: slot.id

        - id: syntax.fragments
          source:
            path: fragments
            as: fragment
            optional: true
          facts:
            - kind: node
              id:
                $expr:
                  os_node_id:
                    - syntax.fragment
                    - var: document.namespace
                    - var: fragment.id
              factKind:
                $expr: syntax.fragment
              attributes:
                $expr:
                  os_object:
                    - nodeId:
                        os_node_id:
                          - syntax.fragment
                          - var: document.namespace
                          - var: fragment.id
                      id:
                        var: fragment.id
                      unit:
                        var: fragment.unit
                      unitNodeId:
                        os_node_id:
                          - syntax.unit
                          - var: document.namespace
                          - var: fragment.unit
                      namespace:
                        var: document.namespace
                      owner:
                        var: document.owner
                      kind:
                        var: fragment.kind
                      target:
                        var: fragment.target
                      role:
                        var:
                          - fragment.role
                          - null
                      order:
                        var:
                          - fragment.order
                          - null
                      metadata:
                        var:
                          - fragment.metadata
                          - null
            - kind: edge
              id:
                $expr:
                  cat:
                    - os_node_id:
                        - syntax.unit
                        - var: document.namespace
                        - var: fragment.unit
                    - .fragment.
                    - var: fragment.id
              factKind:
                $expr: syntax.unit.fragment
              from:
                $expr:
                  os_node_id:
                    - syntax.unit
                    - var: document.namespace
                    - var: fragment.unit
              to:
                $expr:
                  os_node_id:
                    - syntax.fragment
                    - var: document.namespace
                    - var: fragment.id

        - id: syntax.references
          source:
            path: references
            as: reference
            optional: true
          facts:
            - kind: node
              id:
                $expr:
                  os_node_id:
                    - syntax.reference
                    - var: document.namespace
                    - var: reference.id
              factKind:
                $expr: syntax.reference
              attributes:
                $expr:
                  os_object:
                    - nodeId:
                        os_node_id:
                          - syntax.reference
                          - var: document.namespace
                          - var: reference.id
                      id:
                        var: reference.id
                      unit:
                        var: reference.unit
                      unitNodeId:
                        os_node_id:
                          - syntax.unit
                          - var: document.namespace
                          - var: reference.unit
                      namespace:
                        var: document.namespace
                      owner:
                        var: document.owner
                      kind:
                        var: reference.kind
                      from:
                        var: reference.from
                      to:
                        var: reference.to
                      role:
                        var:
                          - reference.role
                          - null
                      order:
                        var:
                          - reference.order
                          - null
                      metadata:
                        var:
                          - reference.metadata
                          - null
            - kind: edge
              id:
                $expr:
                  cat:
                    - os_node_id:
                        - syntax.unit
                        - var: document.namespace
                        - var: reference.unit
                    - .reference.
                    - var: reference.id
              factKind:
                $expr: syntax.unit.reference
              from:
                $expr:
                  os_node_id:
                    - syntax.unit
                    - var: document.namespace
                    - var: reference.unit
              to:
                $expr:
                  os_node_id:
                    - syntax.reference
                    - var: document.namespace
                    - var: reference.id
            - kind: edge
              id:
                $expr:
                  cat:
                    - os_node_id:
                        - syntax.reference
                        - var: document.namespace
                        - var: reference.id
                    - .from.
                    - var: reference.from
              factKind:
                $expr: syntax.reference.from
              from:
                $expr:
                  os_node_id:
                    - syntax.reference
                    - var: document.namespace
                    - var: reference.id
              to:
                $expr:
                  var: reference.from
            - kind: edge
              id:
                $expr:
                  cat:
                    - os_node_id:
                        - syntax.reference
                        - var: document.namespace
                        - var: reference.id
                    - .to.
                    - var: reference.to
              factKind:
                $expr: syntax.reference.to
              from:
                $expr:
                  os_node_id:
                    - syntax.reference
                    - var: document.namespace
                    - var: reference.id
              to:
                $expr:
                  var: reference.to

        - id: syntax.dependencies
          source:
            path: dependencies
            as: dependency
            optional: true
          facts:
            - kind: node
              id:
                $expr:
                  os_node_id:
                    - syntax.dependency
                    - var: document.namespace
                    - var: dependency.id
              factKind:
                $expr: syntax.dependency
              attributes:
                $expr:
                  os_object:
                    - nodeId:
                        os_node_id:
                          - syntax.dependency
                          - var: document.namespace
                          - var: dependency.id
                      id:
                        var: dependency.id
                      unit:
                        var: dependency.unit
                      unitNodeId:
                        os_node_id:
                          - syntax.unit
                          - var: document.namespace
                          - var: dependency.unit
                      namespace:
                        var: document.namespace
                      owner:
                        var: document.owner
                      kind:
                        var: dependency.kind
                      from:
                        var: dependency.from
                      to:
                        var: dependency.to
                      role:
                        var:
                          - dependency.role
                          - null
                      order:
                        var:
                          - dependency.order
                          - null
                      metadata:
