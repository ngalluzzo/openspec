                          - dependency.metadata
                          - null
            - kind: edge
              id:
                $expr:
                  cat:
                    - os_node_id:
                        - syntax.unit
                        - var: document.namespace
                        - var: dependency.unit
                    - .dependency.
                    - var: dependency.id
              factKind:
                $expr: syntax.unit.dependency
              from:
                $expr:
                  os_node_id:
                    - syntax.unit
                    - var: document.namespace
                    - var: dependency.unit
              to:
                $expr:
                  os_node_id:
                    - syntax.dependency
                    - var: document.namespace
                    - var: dependency.id
            - kind: edge
              id:
                $expr:
                  cat:
                    - var: dependency.from
                    - .syntaxDependency.
                    - var: dependency.to
              factKind:
                $expr: syntax.dependency.edge
              from:
                $expr:
                  var: dependency.from
              to:
                $expr:
                  var: dependency.to
              attributes:
                $expr:
                  os_object:
                    - dependency:
                        os_node_id:
                          - syntax.dependency
                          - var: document.namespace
                          - var: dependency.id
                      kind:
                        var: dependency.kind
                      role:
                        var:
                          - dependency.role
                          - null

      selectors:
        - id: syntax.units
          sources:
            unit:
              kind: nodes
              filter:
                kind:
                  $expr: syntax.unit
          result:
            cardinality: many
            value:
              $expr:
                var: row.unit.attributes
          orderBy:
            - $expr:
                var: row.value.nodeId
          paramsContract:
            kind: model
            model: model:SyntaxSelectorNoParams
          returnsContract:
            kind: model
            model: model:SyntaxUnitsSelectorResult

        - id: syntax.symbols
          sources:
            symbol:
              kind: nodes
              filter:
                kind:
                  $expr: syntax.symbol
          result:
            cardinality: many
            value:
              $expr:
                var: row.symbol.attributes
          orderBy:
            - $expr:
                var: row.value.nodeId
          paramsContract:
            kind: model
            model: model:SyntaxSelectorNoParams
          returnsContract:
            kind: model
            model: model:SyntaxSymbolsSelectorResult

        - id: syntax.slots
          sources:
            slot:
              kind: nodes
              filter:
                kind:
                  $expr: syntax.slot
          result:
            cardinality: many
            value:
              $expr:
                var: row.slot.attributes
          orderBy:
            - $expr:
                var: row.value.nodeId
          paramsContract:
            kind: model
            model: model:SyntaxSelectorNoParams
          returnsContract:
            kind: model
            model: model:SyntaxSlotsSelectorResult

        - id: syntax.fragments
          sources:
            fragment:
              kind: nodes
              filter:
                kind:
                  $expr: syntax.fragment
          result:
            cardinality: many
            value:
              $expr:
                var: row.fragment.attributes
          orderBy:
            - $expr:
                var: row.value.nodeId
          paramsContract:
            kind: model
            model: model:SyntaxSelectorNoParams
          returnsContract:
            kind: model
            model: model:SyntaxFragmentsSelectorResult

        - id: syntax.references
          sources:
            reference:
              kind: nodes
              filter:
                kind:
                  $expr: syntax.reference
          result:
            cardinality: many
            value:
              $expr:
                var: row.reference.attributes
          orderBy:
            - $expr:
                var: row.value.nodeId
          paramsContract:
            kind: model
            model: model:SyntaxSelectorNoParams
          returnsContract:
            kind: model
            model: model:SyntaxReferencesSelectorResult

        - id: syntax.dependencies
          sources:
            dependency:
              kind: nodes
              filter:
                kind:
                  $expr: syntax.dependency
          result:
            cardinality: many
            value:
              $expr:
                var: row.dependency.attributes
          orderBy:
            - $expr:
                var: row.value.nodeId
          paramsContract:
            kind: model
            model: model:SyntaxSelectorNoParams
          returnsContract:
            kind: model
            model: model:SyntaxDependenciesSelectorResult

        - id: syntax.symbolsForUnit
          sources:
            symbol:
              kind: nodes
              filter:
                kind:
                  $expr: syntax.symbol
          where:
            $expr:
              or:
                - ===:
                    - var: row.symbol.attributes.unit
                    - var: parameter.unit
                - ===:
                    - var: row.symbol.attributes.unitNodeId
                    - var: parameter.unit
          result:
            cardinality: many
            value:
              $expr:
                var: row.symbol.attributes
          orderBy:
            - $expr:
                var:
                  - row.value.order
                  - 0
            - $expr:
                var: row.value.nodeId
          paramsContract:
            kind: model
            model: model:SyntaxByUnitSelectorParams
          returnsContract:
            kind: model
            model: model:SyntaxSymbolsSelectorResult

        - id: syntax.slotsForUnit
          sources:
            slot:
              kind: nodes
              filter:
                kind:
                  $expr: syntax.slot
          where:
            $expr:
              or:
                - ===:
                    - var: row.slot.attributes.unit
                    - var: parameter.unit
                - ===:
                    - var: row.slot.attributes.unitNodeId
                    - var: parameter.unit
          result:
            cardinality: many
            value:
              $expr:
                var: row.slot.attributes
          orderBy:
            - $expr:
                var:
                  - row.value.order
                  - 0
            - $expr:
                var: row.value.nodeId
          paramsContract:
            kind: model
            model: model:SyntaxByUnitSelectorParams
          returnsContract:
            kind: model
            model: model:SyntaxSlotsSelectorResult

        - id: syntax.fragmentsForUnit
          sources:
            fragment:
              kind: nodes
              filter:
                kind:
                  $expr: syntax.fragment
          where:
            $expr:
              or:
                - ===:
                    - var: row.fragment.attributes.unit
                    - var: parameter.unit
                - ===:
                    - var: row.fragment.attributes.unitNodeId
                    - var: parameter.unit
          result:
            cardinality: many
            value:
              $expr:
                var: row.fragment.attributes
          orderBy:
            - $expr:
                var:
                  - row.value.order
                  - 0
            - $expr:
                var: row.value.nodeId
          paramsContract:
            kind: model
            model: model:SyntaxByUnitSelectorParams
          returnsContract:
            kind: model
            model: model:SyntaxFragmentsSelectorResult

        - id: syntax.referencesForUnit
          sources:
            reference:
              kind: nodes
              filter:
                kind:
                  $expr: syntax.reference
          where:
            $expr:
              or:
                - ===:
                    - var: row.reference.attributes.unit
                    - var: parameter.unit
                - ===:
                    - var: row.reference.attributes.unitNodeId
                    - var: parameter.unit
          result:
            cardinality: many
            value:
              $expr:
                var: row.reference.attributes
          orderBy:
            - $expr:
                var:
                  - row.value.order
                  - 0
            - $expr:
                var: row.value.nodeId
          paramsContract:
            kind: model
            model: model:SyntaxByUnitSelectorParams
          returnsContract:
            kind: model
            model: model:SyntaxReferencesSelectorResult

        - id: syntax.dependenciesForUnit
          sources:
            dependency:
              kind: nodes
              filter:
                kind:
                  $expr: syntax.dependency
          where:
            $expr:
              or:
                - ===:
                    - var: row.dependency.attributes.unit
                    - var: parameter.unit
                - ===:
                    - var: row.dependency.attributes.unitNodeId
                    - var: parameter.unit
          result:
            cardinality: many
            value:
              $expr:
                var: row.dependency.attributes
          orderBy:
            - $expr:
                var:
                  - row.value.order
                  - 0
            - $expr:
                var: row.value.nodeId
          paramsContract:
            kind: model
            model: model:SyntaxByUnitSelectorParams
          returnsContract:
            kind: model
            model: model:SyntaxDependenciesSelectorResult

        - id: syntax.symbolsByTarget
          sources:
            symbol:
              kind: nodes
              filter:
                kind:
                  $expr: syntax.symbol
          where:
            $expr:
              ===:
                - var: row.symbol.attributes.target
                - var: parameter.target
          result:
            cardinality: many
            value:
              $expr:
                var: row.symbol.attributes
          orderBy:
            - $expr:
                var: row.value.nodeId
          paramsContract:
            kind: model
            model: model:SyntaxByTargetSelectorParams
          returnsContract:
            kind: model
            model: model:SyntaxSymbolsSelectorResult

        - id: syntax.slotsByTarget
          sources:
            slot:
              kind: nodes
              filter:
                kind:
                  $expr: syntax.slot
          where:
            $expr:
              ===:
                - var: row.slot.attributes.target
                - var: parameter.target
          result:
            cardinality: many
            value:
              $expr:
                var: row.slot.attributes
          orderBy:
            - $expr:
                var: row.value.nodeId
          paramsContract:
            kind: model
            model: model:SyntaxByTargetSelectorParams
          returnsContract:
            kind: model
            model: model:SyntaxSlotsSelectorResult

        - id: syntax.invalidSymbolUnitLinks
          sources:
            symbol:
              kind: nodes
              filter:
                kind:
                  $expr: syntax.symbol
            unit:
              kind: nodes
              optional: true
              filter:
                id:
                  $expr:
                    var: row.symbol.attributes.unitNodeId
                kind:
                  $expr: syntax.unit
          where:
            $expr:
              "!":
                - var:
                    - row.unit
                    - null
          result:
            cardinality: many
            value:
              $expr:
                os_object:
                  - nodeId:
                      var: row.symbol.attributes.nodeId
                    id:
                      var: row.symbol.attributes.id
                    unit:
                      var: row.symbol.attributes.unit
                    unitNodeId:
                      var: row.symbol.attributes.unitNodeId
                    kind:
                      var: row.symbol.attributes.kind
                    sourceKind:
                      $expr: syntax.symbol
          paramsContract:
            kind: model
            model: model:SyntaxSelectorNoParams
          returnsContract:
            kind: model
            model: model:SyntaxInvalidUnitLinksSelectorResult

        - id: syntax.invalidSlotUnitLinks
          sources:
            slot:
              kind: nodes
              filter:
                kind:
                  $expr: syntax.slot
            unit:
              kind: nodes
              optional: true
              filter:
                id:
                  $expr:
                    var: row.slot.attributes.unitNodeId
                kind:
                  $expr: syntax.unit
          where:
            $expr:
              "!":
                - var:
                    - row.unit
                    - null
          result:
            cardinality: many
            value:
              $expr:
                os_object:
                  - nodeId:
                      var: row.slot.attributes.nodeId
                    id:
                      var: row.slot.attributes.id
                    unit:
                      var: row.slot.attributes.unit
                    unitNodeId:
                      var: row.slot.attributes.unitNodeId
                    kind:
                      var: row.slot.attributes.kind
                    sourceKind:
                      $expr: syntax.slot
          paramsContract:
            kind: model
            model: model:SyntaxSelectorNoParams
          returnsContract:
            kind: model
            model: model:SyntaxInvalidUnitLinksSelectorResult

        - id: syntax.invalidFragmentUnitLinks
          sources:
            fragment:
              kind: nodes
              filter:
                kind:
                  $expr: syntax.fragment
            unit:
              kind: nodes
              optional: true
              filter:
                id:
                  $expr:
                    var: row.fragment.attributes.unitNodeId
                kind:
                  $expr: syntax.unit
          where:
            $expr:
              "!":
                - var:
                    - row.unit
                    - null
          result:
            cardinality: many
            value:
              $expr:
                os_object:
                  - nodeId:
                      var: row.fragment.attributes.nodeId
                    id:
                      var: row.fragment.attributes.id
                    unit:
                      var: row.fragment.attributes.unit
                    unitNodeId:
                      var: row.fragment.attributes.unitNodeId
                    kind:
                      var: row.fragment.attributes.kind
                    sourceKind:
