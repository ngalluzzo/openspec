                  - nodeId:
                      var: row.reference.attributes.nodeId
                    id:
                      var: row.reference.attributes.id
                    unit:
                      var: row.reference.attributes.unit
                    unitNodeId:
                      var: row.reference.attributes.unitNodeId
                    kind:
                      var: row.reference.attributes.kind
                    sourceKind:
                      $expr: syntax.reference
          paramsContract:
            kind: model
            model: model:SyntaxSelectorNoParams
          returnsContract:
            kind: model
            model: model:SyntaxInvalidUnitLinksSelectorResult

        - id: syntax.invalidDependencyUnitLinks
          sources:
            dependency:
              kind: nodes
              filter:
                kind:
                  $expr: syntax.dependency
            unit:
              kind: nodes
              optional: true
              filter:
                id:
                  $expr:
                    var: row.dependency.attributes.unitNodeId
                kind:
                  $expr: syntax.unit
          where:
            $expr:
              "!":
                - var:
                    - row.unit
                    - null
          result:
            cardinality: many
            value:
              $expr:
                os_object:
                  - nodeId:
                      var: row.dependency.attributes.nodeId
                    id:
                      var: row.dependency.attributes.id
                    unit:
                      var: row.dependency.attributes.unit
                    unitNodeId:
                      var: row.dependency.attributes.unitNodeId
                    kind:
                      var: row.dependency.attributes.kind
                    sourceKind:
                      $expr: syntax.dependency
          paramsContract:
            kind: model
            model: model:SyntaxSelectorNoParams
          returnsContract:
            kind: model
            model: model:SyntaxInvalidUnitLinksSelectorResult

      validate:
        - id: syntax.validation
          rules:
            - id: unit-kind-format
              scope: selector
              selector: syntax.units
              forEach: true
              assert:
                $expr:
                  regex_test:
                    - ^[a-z][a-z0-9]*(\.[a-z0-9-]+)*$
                    - var: item.kind
              code: syntax.unit.kind.invalid
              message: Syntax unit kind must be a lowercase namespaced identifier.
              details:
                $expr:
                  os_object:
                    - unit:
                        var: item.nodeId
                      kind:
                        var: item.kind

            - id: symbol-kind-format
              scope: selector
              selector: syntax.symbols
              forEach: true
              assert:
                $expr:
                  regex_test:
                    - ^[a-z][a-z0-9]*(\.[a-z0-9-]+)*$
                    - var: item.kind
