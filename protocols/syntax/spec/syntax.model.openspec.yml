              type: nonEmptyString
            - name: id
              type: nonEmptyString
            - name: namespace
              type: nonEmptyString
            - name: owner
              type: nonEmptyString
            - name: kind
              type: nonEmptyString
            - name: asset
              type: nonEmptyString
              required: false
            - name: subject
              type: nonEmptyString
              required: false
            - name: role
