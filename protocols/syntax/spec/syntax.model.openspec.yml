              type: unknown
              required: false

        - kind: object
          name: SyntaxReferenceDeclaration
          fields:
            - name: id
              type: nonEmptyString
            - name: unit
              type: nonEmptyString
            - name: kind
              type: nonEmptyString
            - name: from
              type: nonEmptyString
            - name: to
              type: nonEmptyString
            - name: role
              type: nonEmptyString
              required: false
            - name: order
              type: number
              required: false
            - name: metadata
              type: unknown
              required: false

        - kind: object
