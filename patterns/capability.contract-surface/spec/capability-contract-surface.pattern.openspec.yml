openspec: "1.0"
documents:
  - id: capability-contract-surface.pattern
    protocol: openspec.pattern.v1
    document:
      namespace:
        id: capability.contract-surface
        name: Capability Contract Surface Pattern
      patterns:
        - id: capability.contract-surface
          owner: pattern.package:capability.contract-surface
          name: Capability contract surface
          metadata:
            composes:
              - openspec.capability.v1
              - openspec.syntax.v1
            relation: Creates target-neutral syntax symbols and slots for capability method contracts.
          expands:
            documents:
              - id:
                  expr:
                    kind: concat
                    items:
                      - kind: path
                        path: input.id
                      - kind: literal
                        value: .syntax
                protocol: openspec.syntax.v1
                document:
                  owner:
                    expr:
                      kind: path
                      path: input.owner
                  namespace:
                    expr:
                      kind: path
                      path: input.namespace
                      optional: true
                      default:
                        kind: path
                        path: input.id
                  units:
                    - id:
                        expr:
                          kind: path
                          path: input.unit.id
                          optional: true
                          default:
                            kind: path
                            path: input.id
                      kind: capability.contract.surface
                      subject:
                        expr:
                          kind: path
                          path: input.capability
                      role: capability.contract.surface
                  symbols:
                    expr:
                      kind: map
                      path: input.methods
                      as: method
                      optional: true
                      value:
                        kind: object
                        fields:
                          id:
                            kind: path
                            path: method.name
                          unit:
                            kind: path
                            path: input.unit.id
                            optional: true
                            default:
                              kind: path
                              path: input.id
                          kind:
                            kind: literal
                            value: capability.method
                          name:
                            kind: path
                            path: method.name
                          target:
                            kind: concat
                            items:
                              - kind: path
                                path: input.capability
                              - kind: literal
                                value: "."
                              - kind: path
                                path: method.name
                          role:
                            kind: literal
                            value: method.contract
                  slots:
                    expr:
                      kind: map
                      path: input.methods
                      as: method
                      optional: true
                      value:
                        kind: object
                        fields:
                          id:
                            kind: concat
                            items:
                              - kind: path
                                path: method.name
                              - kind: literal
                                value: .contract
                          unit:
                            kind: path
                            path: input.unit.id
                            optional: true
                            default:
                              kind: path
                              path: input.id
                          kind:
                            kind: literal
                            value: method.contract
                          target:
                            kind: concat
                            items:
                              - kind: path
                                path: input.capability
                              - kind: literal
                                value: "."
                              - kind: path
                                path: method.name
                          symbol:
                            kind: path
                            path: method.name
                          role:
                            kind: literal
                            value: method.contract
