openspec: "1.0"
documents:
  - id: model-syntax.pattern
    protocol: openspec.pattern.v1
    document:
      namespace:
        id: model.syntax
        name: Model Syntax Pattern
      patterns:
        - id: model.syntax
          owner: pattern.package:model.syntax
          name: Model syntax
          metadata:
            composes:
              - openspec.model.v1
              - openspec.syntax.v1
            relation: Creates target-neutral syntax units, symbols, and slots for model-owned generated surfaces.
          expands:
            documents:
              - id:
                  expr:
                    kind: concat
                    items:
                      - kind: path
                        path: input.id
                      - kind: literal
                        value: .syntax
                protocol: openspec.syntax.v1
                document:
                  owner:
                    expr:
                      kind: path
                      path: input.owner
                  namespace:
                    expr:
                      kind: path
                      path: input.namespace
                      optional: true
                      default:
                        kind: path
                        path: input.id
                  units:
                    - id:
                        expr:
                          kind: path
                          path: input.unit.id
                          optional: true
                          default:
                            kind: path
                            path: input.id
                      kind:
                        expr:
                          kind: path
                          path: input.unit.kind
                          optional: true
                          default:
                            kind: literal
                            value: model.type.surface
                      subject:
                        expr:
                          kind: path
                          path: input.subject
                          optional: true
                          default:
                            kind: path
                            path: input.owner
                      role:
                        expr:
                          kind: path
                          path: input.role
                          optional: true
                          default:
                            kind: literal
                            value: model.type.surface
                      metadata:
                        expr:
                          kind: path
                          path: input.metadata
                          optional: true
                  symbols:
                    expr:
                      kind: arrayConcat
                      items:
                        - kind: map
                          path: input.declarations
                          as: declaration
                          optional: true
                          value:
                            kind: object
                            fields:
                              id:
                                kind: path
                                path: declaration.name
                              unit:
                                kind: path
                                path: input.unit.id
                                optional: true
                                default:
                                  kind: path
                                  path: input.id
                              kind:
                                kind: literal
                                value: model.declaration
                              name:
                                kind: path
                                path: declaration.name
                              target:
                                kind: concat
                                items:
                                  - kind: literal
                                    value: "model:"
                                  - kind: path
                                    path: input.owner
                                  - kind: literal
                                    value: "."
                                  - kind: path
                                    path: declaration.name
                              role:
                                kind: path
                                path: input.symbolRole
                                optional: true
                                default:
                                  kind: literal
                                  value: type.declaration
                        - kind: path
                          path: input.symbols
                          optional: true
                  slots:
                    expr:
                      kind: arrayConcat
                      items:
                        - kind: map
                          path: input.declarations
                          as: declaration
                          optional: true
                          value:
                            kind: object
                            fields:
                              id:
                                kind: concat
                                items:
                                  - kind: path
                                    path: declaration.name
                                  - kind: literal
                                    value: .value
                              unit:
                                kind: path
                                path: input.unit.id
                                optional: true
                                default:
                                  kind: path
                                  path: input.id
                              kind:
                                kind: literal
                                value: type.declaration
                              target:
                                kind: concat
                                items:
                                  - kind: literal
                                    value: "model:"
                                  - kind: path
                                    path: input.owner
                                  - kind: literal
                                    value: "."
                                  - kind: path
                                    path: declaration.name
                              symbol:
                                kind: path
                                path: declaration.name
                              role:
                                kind: literal
                                value: type.declaration
                        - kind: path
                          path: input.slots
                          optional: true
                  fragments:
                    expr:
                      kind: path
                      path: input.fragments
                      optional: true
                  references:
                    expr:
                      kind: path
                      path: input.references
                      optional: true
                  dependencies:
                    expr:
                      kind: path
                      path: input.dependencies
                      optional: true
