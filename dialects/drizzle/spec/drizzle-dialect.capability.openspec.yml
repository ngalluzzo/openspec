openspec: "1.0"
documents:
  - id: drizzle-dialect.capability
    protocol: openspec.capability.v1
    document:
      owner: dialect.package:drizzle
      capabilities:
        - id: drizzle.syntax.render
          kind: projection.syntax.render
          description: Render Drizzle syntax facets into a TypeScript schema artifact recipe.
          methods:
            render:
              inputs:
                input:
                  type:
                    kind: ref
                    name: DrizzleSyntaxRenderInput
                  required: true
              output:
                type:
                  kind: ref
                  name: TextFileArtifactRecipe
