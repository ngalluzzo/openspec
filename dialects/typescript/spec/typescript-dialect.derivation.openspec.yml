openspec: "1.0"
documents:
  - id: typescript-dialect.derivation
    protocol: openspec.derivation.v1
    document:
      owner: provider.provider:typescript
      rules:
        - id: typescript.type.declarations.from-model
          source:
            selector: typescript.typeDeclarationFacetsFromModel
            as: modelType
          facts:
            - kind: facet
              id:
                kind: concat
                items:
                  - "typescript.declaration:"
                  - kind: path
                    path: modelType.id
              factKind: typescript.declaration
              target:
                kind: path
                path: modelType.target
              value:
                kind: object
                fields:
                  unit:
                    kind: path
                    path: modelType.unit
                  kind:
                    kind: literal
                    value: typeAlias
                  name:
                    kind: path
                    path: modelType.name
                  role:
                    kind: literal
                    value: type.declaration
                  exported:
                    kind: literal
                    value: true
                  type:
                    kind: when
                    condition:
                      kind: equals
                      left:
                        kind: path
                        path: modelType.declaration.kind
                        optional: true
                      right:
                        kind: literal
                        value: enum
                    then:
                      kind: object
                      fields:
                        kind:
                          kind: literal
                          value: union
                        options:
                          kind: map
                          path: modelType.declaration.values
                          as: enumValue
                          optional: true
                          value:
                            kind: object
                            fields:
                              kind:
                                kind: literal
                                value: literal
                              value:
                                kind: path
                                path: enumValue
                    else:
                      kind: when
                      condition:
                        kind: equals
                        left:
                          kind: path
                          path: modelType.declaration.kind
                          optional: true
                        right:
                          kind: literal
                          value: alias
                      then:
                        kind: match
                        value:
                          kind: path
                          path: modelType.declaration.type.kind
                          optional: true
                        cases:
                          ref:
                            kind: object
                            fields:
                              kind:
                                kind: literal
                                value: ref
                              name:
                                kind: path
                                path: modelType.declaration.type.name
                          union:
                            kind: object
                            fields:
                              kind:
                                kind: literal
                                value: union
                              options:
                                kind: map
                                path: modelType.declaration.type.options
                                as: option
                                optional: true
                                value:
                                  kind: object
                                  fields:
                                    kind:
                                      kind: literal
                                      value: keyword
                                    name:
                                      kind: match
                                      value:
                                        kind: path
                                        path: option
                                        optional: true
                                      cases:
                                        string:
                                          kind: literal
                                          value: string
                                        nonEmptyString:
                                          kind: literal
                                          value: string
                                        number:
                                          kind: literal
                                          value: number
                                        boolean:
                                          kind: literal
                                          value: boolean
                                        unknown:
                                          kind: literal
                                          value: unknown
                                      default:
                                        kind: literal
                                        value: unknown
                        default:
                          kind: object
                          fields:
                            kind:
                              kind: literal
                              value: keyword
                            name:
                              kind: match
                              value:
                                kind: path
                                path: modelType.declaration.type
                                optional: true
                              cases:
                                string:
                                  kind: literal
                                  value: string
                                nonEmptyString:
                                  kind: literal
                                  value: string
                                number:
                                  kind: literal
                                  value: number
                                boolean:
                                  kind: literal
                                  value: boolean
                                unknown:
                                  kind: literal
                                  value: unknown
                              default:
                                kind: literal
                                value: unknown
                      else:
                        kind: object
                        fields:
                          kind:
                            kind: literal
                            value: object
                          properties:
                            kind: map
                            path: modelType.fields
                            as: field
                            optional: true
                            value:
                              kind: object
                              fields:
                                name:
                                  kind: path
                                  path: field.name
                                optional:
                                  kind: when
                                  condition:
                                    kind: equals
                                    left:
                                      kind: path
                                      path: field.required
                                      optional: true
                                    right:
                                      kind: literal
                                      value: false
                                  then:
                                    kind: literal
                                    value: true
                                  else:
                                    kind: literal
                                    value: false
                                comment:
                                  kind: path
                                  path: field.description
                                  optional: true
                                type:
                                  kind: match
                                  value:
                                    kind: path
                                    path: field.type.kind
                                    optional: true
                                  cases:
                                    scalar:
                                      kind: object
                                      fields:
                                        kind:
                                          kind: literal
                                          value: keyword
                                        name:
                                          kind: match
                                          value:
                                            kind: path
                                            path: field.type.name
                                            optional: true
                                          cases:
                                            string:
                                              kind: literal
                                              value: string
                                            nonEmptyString:
                                              kind: literal
                                              value: string
                                            number:
                                              kind: literal
                                              value: number
                                            boolean:
                                              kind: literal
                                              value: boolean
                                            unknown:
                                              kind: literal
                                              value: unknown
                                          default:
                                            kind: literal
                                            value: unknown
                                    string:
                                      kind: object
                                      fields:
                                        kind:
                                          kind: literal
                                          value: keyword
                                        name:
                                          kind: literal
                                          value: string
                                    nonEmptyString:
                                      kind: object
                                      fields:
                                        kind:
                                          kind: literal
                                          value: keyword
                                        name:
                                          kind: literal
                                          value: string
                                    number:
                                      kind: object
                                      fields:
                                        kind:
                                          kind: literal
                                          value: keyword
                                        name:
                                          kind: literal
                                          value: number
                                    boolean:
                                      kind: object
                                      fields:
                                        kind:
                                          kind: literal
                                          value: keyword
                                        name:
                                          kind: literal
                                          value: boolean
                                    unknown:
                                      kind: object
                                      fields:
                                        kind:
                                          kind: literal
                                          value: keyword
                                        name:
                                          kind: literal
                                          value: unknown
                                    array:
                                      kind: object
                                      fields:
                                        kind:
                                          kind: literal
                                          value: array
                                        item:
                                          kind: when
                                          condition:
                                            kind: is
                                            value:
                                              kind: path
                                              path: field.type.item.name
                                              optional: true
                                              default:
                                                kind: path
                                                path: field.type.items.name
                                                optional: true
                                          then:
                                            kind: object
                                            fields:
                                              kind:
                                                kind: literal
                                                value: ref
                                              name:
                                                kind: path
                                                path: field.type.item.name
                                                optional: true
                                                default:
                                                  kind: path
                                                  path: field.type.items.name
                                                  optional: true
                                          else:
                                            kind: object
                                            fields:
                                              kind:
                                                kind: literal
                                                value: keyword
                                              name:
                                                kind: match
                                                value:
                                                  kind: path
                                                  path: field.type.item.kind
                                                  optional: true
                                                  default:
                                                    kind: path
                                                    path: field.type.items.kind
                                                    optional: true
                                                cases:
                                                  string:
                                                    kind: literal
                                                    value: string
                                                  number:
                                                    kind: literal
                                                    value: number
                                                  boolean:
                                                    kind: literal
                                                    value: boolean
                                                  unknown:
                                                    kind: literal
                                                    value: unknown
                                                default:
                                                  kind: literal
                                                  value: unknown
                                    ref:
                                      kind: object
                                      fields:
                                        kind:
                                          kind: literal
                                          value: ref
                                        name:
                                          kind: path
                                          path: field.type.name
                                          optional: true
                                    literal:
                                      kind: object
                                      fields:
                                        kind:
                                          kind: literal
                                          value: literal
                                        value:
                                          kind: path
                                          path: field.type.value
                                          optional: true
                                default:
                                  kind: object
                                  fields:
                                    kind:
                                      kind: literal
                                      value: keyword
                                    name:
                                      kind: match
                                      value:
                                        kind: path
                                        path: field.type
                                        optional: true
                                      cases:
                                        string:
                                          kind: literal
                                          value: string
                                        nonEmptyString:
                                          kind: literal
                                          value: string
                                        number:
                                          kind: literal
                                          value: number
                                        boolean:
                                          kind: literal
                                          value: boolean
                                        unknown:
                                          kind: literal
                                          value: unknown
                                      default:
                                        kind: literal
                                        value: unknown

        - id: typescript.cli.program.imports
          source:
            selector: typescript.cliProgramSurfaces
            as: program
          facts:
            - kind: facet
              id:
                kind: concat
                items:
                  - "typescript.import:"
                  - kind: path
                    path: program.id
                  - ".program-runtime"
              factKind: typescript.import
              target:
                kind: path
                path: program.unit
              value:
                kind: object
                fields:
                  unit:
                    kind: path
                    path: program.unit
                  module:
                    kind: path
                    path: program.programImportModule
                  order:
                    kind: literal
                    value: 10
                  named:
                    kind: array
                    items:
                      - kind: object
                        fields:
                          imported:
                            kind: path
                            path: program.programTypeName

        - id: typescript.cli.command.option.types
          source:
            selector: typescript.cliProgramCommands
            as: command
          facts:
            - kind: facet
              id:
                kind: concat
                items:
                  - "typescript.declaration:"
                  - kind: path
                    path: command.id
                  - ".options"
              factKind: typescript.declaration
              target:
                kind: path
                path: command.unit
              value:
                kind: object
                fields:
                  unit:
                    kind: path
                    path: command.unit
                  kind:
                    kind: literal
                    value: typeAlias
                  role:
                    kind: literal
                    value: cli.command.options.type
                  order:
                    kind: literal
                    value: 100
                  name:
                    kind: path
                    path: command.optionTypeName
                  exported:
                    kind: literal
                    value: true
                  type:
                    kind: object
                    fields:
                      kind:
                        kind: literal
                        value: object
                      properties:
                        kind: map
                        path: command.options
                        as: option
                        optional: true
                        value:
                          kind: object
                          fields:
                            name:
                              kind: path
                              path: option.name
                            optional:
                              kind: when
                              condition:
                                kind: equals
                                left:
                                  kind: path
                                  path: option.required
                                  optional: true
                                right:
                                  kind: literal
                                  value: true
                              then:
                                kind: literal
                                value: false
                              else:
                                kind: literal
                                value: true
                            type:
                              kind: when
                              condition:
                                kind: is
                                value:
                                  kind: path
                                  path: option.values
                                  optional: true
                              then:
                                kind: object
                                fields:
                                  kind:
                                    kind: literal
                                    value: union
                                  options:
                                    kind: map
                                    path: option.values
                                    as: value
                                    optional: true
                                    value:
                                      kind: object
                                      fields:
                                        kind:
                                          kind: literal
                                          value: literal
                                        value:
                                          kind: path
                                          path: value
                              else:
                                kind: object
                                fields:
                                  kind:
                                    kind: literal
                                    value: keyword
                                  name:
                                    kind: match
                                    value:
                                      kind: path
                                      path: option.valueType
                                      optional: true
                                    cases:
                                      boolean:
                                        kind: literal
                                        value: boolean
                                      number:
                                        kind: literal
                                        value: number
                                      string:
                                        kind: literal
                                        value: string
                                    default:
                                      kind: literal
                                      value: string

        - id: typescript.cli.program.declarations
          source:
            selector: typescript.cliProgramSurfaces
            as: program
          facts:
            - kind: facet
              id:
                kind: concat
                items:
                  - "typescript.declaration:"
                  - kind: path
                    path: program.id
                  - ".handlers"
              factKind: typescript.declaration
              target:
                kind: path
                path: program.unit
              value:
                kind: object
                fields:
                  unit:
                    kind: path
                    path: program.unit
                  kind:
                    kind: literal
                    value: typeAlias
                  role:
                    kind: literal
                    value: cli.handler.map.surface
                  order:
                    kind: literal
                    value: 200
                  name:
                    kind: path
                    path: program.handlerMapTypeName
                  exported:
                    kind: literal
                    value: true
                  type:
                    kind: object
                    fields:
                      kind:
                        kind: literal
                        value: object
                      properties:
                        kind: map
                        path: program.commands
                        as: command
                        value:
                          kind: object
                          fields:
                            name:
                              kind: path
                              path: command.dispatch
                            type:
                              kind: object
                              fields:
                                kind:
                                  kind: literal
                                  value: function
                                parameters:
                                  kind: array
                                  items:
                                    - kind: object
                                      fields:
                                        name:
                                          kind: literal
                                          value: input
                                        type:
                                          kind: object
                                          fields:
                                            kind:
                                              kind: literal
                                              value: ref
                                            name:
                                              kind: path
                                              path: command.optionTypeName
                                returnType:
                                  kind: object
                                  fields:
                                    kind:
                                      kind: literal
                                      value: promise
                                    value:
                                      kind: object
                                      fields:
                                        kind:
                                          kind: literal
                                          value: keyword
                                        name:
                                          kind: literal
                                          value: void

            - kind: facet
              id:
                kind: concat
                items:
                  - "typescript.declaration:"
                  - kind: path
                    path: program.id
                  - ".factory"
              factKind: typescript.declaration
              target:
                kind: path
                path: program.unit
              value:
                kind: object
                fields:
                  unit:
                    kind: path
                    path: program.unit
                  kind:
                    kind: literal
                    value: function
                  role:
                    kind: literal
                    value: typescript.factory.function.surface
                  order:
                    kind: literal
                    value: 300
                  name:
                    kind: path
                    path: program.factoryName
                  exported:
                    kind: literal
                    value: true
                  parameters:
                    kind: array
                    items:
                      - kind: object
                        fields:
                          name:
                            kind: literal
                            value: handlers
                          type:
                            kind: object
                            fields:
                              kind:
                                kind: literal
                                value: typeApplication
                              base:
                                kind: object
                                fields:
                                  kind:
                                    kind: literal
                                    value: ref
                                  name:
                                    kind: literal
                                    value: Partial
                              arguments:
                                kind: array
                                items:
                                  - kind: object
                                    fields:
                                      kind:
                                        kind: literal
                                        value: ref
                                      name:
                                        kind: path
                                        path: program.handlerMapTypeName
                  returnType:
                    kind: object
                    fields:
                      kind:
                        kind: literal
                        value: ref
                      name:
                        kind: path
                        path: program.programTypeName
                  body:
                    kind: arrayConcat
                    items:
                      - kind: array
                        items:
                          - kind: object
                            fields:
                              kind:
                                kind: literal
                                value: const
                              name:
                                kind: literal
                                value: program
                              value:
                                kind: object
                                fields:
                                  kind:
                                    kind: literal
                                    value: new
                                  callee:
                                    kind: object
                                    fields:
                                      kind:
                                        kind: literal
                                        value: identifier
                                      name:
                                        kind: path
                                        path: program.programTypeName
                                  arguments:
                                    kind: array
                                    items: []
                      - kind: map
                        path: program.commands
                        as: command
                        value:
                          kind: object
                          fields:
                            kind:
                              kind: literal
                              value: const
                            name:
                              kind: path
                              path: command.actionName
                            value:
                              kind: object
                              fields:
                                kind:
                                  kind: literal
                                  value: arrowFunction
                                async:
                                  kind: literal
                                  value: true
                                parameters:
                                  kind: array
                                  items:
                                    - kind: object
                                      fields:
                                        name:
                                          kind: literal
                                          value: opts
                                        type:
                                          kind: object
                                          fields:
                                            kind:
                                              kind: literal
                                              value: ref
                                            name:
                                              kind: path
                                              path: command.optionTypeName
                                body:
                                  kind: object
                                  fields:
                                    kind:
                                      kind: literal
                                      value: block
                                    statements:
                                      kind: array
                                      items:
                                        - kind: object
                                          fields:
                                            kind:
                                              kind: literal
                                              value: const
                                            name:
                                              kind: literal
                                              value: handler
                                            value:
                                              kind: object
                                              fields:
                                                kind:
                                                  kind: literal
                                                  value: elementAccess
                                                object:
                                                  kind: object
                                                  fields:
                                                    kind:
                                                      kind: literal
                                                      value: identifier
                                                    name:
                                                      kind: literal
                                                      value: handlers
                                                element:
                                                  kind: object
                                                  fields:
                                                    kind:
                                                      kind: literal
                                                      value: literal
                                                    value:
                                                      kind: path
                                                      path: command.dispatch
                                        - kind: object
                                          fields:
                                            kind:
                                              kind: literal
                                              value: if
                                            condition:
                                              kind: object
                                              fields:
                                                kind:
                                                  kind: literal
                                                  value: unary
                                                operator:
                                                  kind: literal
                                                  value: "!"
                                                value:
                                                  kind: object
                                                  fields:
                                                    kind:
                                                      kind: literal
                                                      value: identifier
                                                    name:
                                                      kind: literal
                                                      value: handler
                                            then:
                                              kind: array
                                              items:
                                                - kind: object
                                                  fields:
                                                    kind:
                                                      kind: literal
                                                      value: throw
                                                    value:
                                                      kind: object
                                                      fields:
                                                        kind:
                                                          kind: literal
                                                          value: new
                                                        callee:
                                                          kind: object
                                                          fields:
                                                            kind:
                                                              kind: literal
                                                              value: identifier
                                                            name:
                                                              kind: literal
                                                              value: Error
                                                        arguments:
                                                          kind: array
                                                          items:
                                                            - kind: object
                                                              fields:
                                                                kind:
                                                                  kind: literal
                                                                  value: literal
                                                                value:
                                                                  kind: concat
                                                                  items:
                                                                    - kind: literal
                                                                      value: "No CLI runtime handler registered for dispatch '"
                                                                    - kind: path
                                                                      path: command.dispatch
                                                                    - kind: literal
                                                                      value: "'."
                                        - kind: object
                                          fields:
                                            kind:
                                              kind: literal
                                              value: expression
                                            expression:
                                              kind: object
                                              fields:
                                                kind:
                                                  kind: literal
                                                  value: await
                                                value:
                                                  kind: object
                                                  fields:
                                                    kind:
                                                      kind: literal
                                                      value: call
                                                    callee:
                                                      kind: object
                                                      fields:
                                                        kind:
                                                          kind: literal
                                                          value: identifier
                                                        name:
                                                          kind: literal
                                                          value: handler
                                                    arguments:
                                                      kind: array
                                                      items:
                                                        - kind: object
                                                          fields:
                                                            kind:
                                                              kind: literal
                                                              value: identifier
                                                            name:
                                                              kind: literal
                                                              value: opts
                      - kind: array
                        items:
                          - kind: object
                            fields:
                              kind:
                                kind: literal
                                value: return
                              value:
                                kind: object
                                fields:
                                  kind:
                                    kind: literal
                                    value: identifier
                                  name:
                                    kind: literal
                                    value: program

        - id: typescript.capability.adapter-contract.imports
          source:
            selector: typescript.capabilityAdapterContractSurfaces
            as: surface
          facts:
            - kind: facet
              id:
                kind: concat
                items:
                  - "typescript.import:"
                  - kind: path
                    path: surface.id
                  - ".models"
              factKind: typescript.import
              target:
                kind: path
                path: surface.unit
              value:
                kind: object
                fields:
                  unit:
                    kind: path
                    path: surface.unit
                  module:
                    kind: path
                    path: surface.surfaceMetadata.modelImportPath
                    optional: true
                    default:
                      kind: literal
                      value: ./types.generated
                  order:
                    kind: literal
                    value: 10
                  namespace:
                    kind: path
                    path: surface.surfaceMetadata.modelNamespace
                    optional: true
                    default:
                      kind: literal
                      value: ModelTypes

        - id: typescript.capability.adapter-contract.declarations
          source:
            selector: typescript.capabilityAdapterContractSurfaces
            as: surface
          facts:
            - kind: facet
              id:
                kind: concat
                items:
                  - "typescript.declaration:"
                  - kind: path
                    path: surface.id
                  - ".adapter"
              factKind: typescript.declaration
              target:
                kind: path
                path: surface.unit
              value:
                kind: object
                fields:
                  unit:
                    kind: path
                    path: surface.unit
                  kind:
                    kind: literal
                    value: typeAlias
                  role:
                    kind: literal
                    value: adapter.implementation.type
                  order:
                    kind: literal
                    value: 100
                  name:
                    kind: path
                    path: surface.surfaceMetadata.adapterTypeName
                  exported:
                    kind: literal
                    value: true
                  type:
                    kind: object
                    fields:
                      kind:
                        kind: literal
                        value: object
                      properties:
                        kind: map
                        path: surface.methods
                        as: method
                        value:
                          kind: object
                          fields:
                            name:
                              kind: path
                              path: method.name
                            type:
                              kind: object
                              fields:
                                kind:
                                  kind: literal
                                  value: function
                                parameters:
                                  kind: array
                                  items:
                                    - kind: object
                                      fields:
                                        name:
                                          kind: literal
                                          value: input
                                        type:
                                          kind: when
                                          condition:
                                            kind: is
                                            value:
                                              kind: path
                                              path: method.inputs.input.type
                                              optional: true
                                          then:
                                            kind: when
                                            condition:
                                              kind: is
                                              value:
                                                kind: path
                                                path: method.inputs.input.type.name
                                                optional: true
                                            then:
                                              kind: object
                                              fields:
                                                kind:
                                                  kind: literal
                                                  value: ref
                                                name:
                                                  kind: concat
                                                  items:
                                                    - kind: path
                                                      path: surface.surfaceMetadata.modelNamespace
                                                      optional: true
                                                      default:
                                                        kind: literal
                                                        value: ModelTypes
                                                    - kind: literal
                                                      value: "."
                                                    - kind: path
                                                      path: method.inputs.input.type.name
                                            else:
                                              kind: object
                                              fields:
                                                kind:
                                                  kind: literal
                                                  value: keyword
                                                name:
                                                  kind: match
                                                  value:
                                                    kind: path
                                                    path: method.inputs.input.type
                                                    optional: true
                                                  cases:
                                                    string:
                                                      kind: literal
                                                      value: string
                                                    nonEmptyString:
                                                      kind: literal
                                                      value: string
                                                    number:
                                                      kind: literal
                                                      value: number
                                                    boolean:
                                                      kind: literal
                                                      value: boolean
                                                    unknown:
                                                      kind: literal
                                                      value: unknown
                                                  default:
                                                    kind: literal
                                                    value: unknown
                                          else:
                                            kind: object
                                            fields:
                                              kind:
                                                kind: literal
                                                value: object
                                              properties:
                                                kind: map
                                                path: method.inputProperties
                                                as: input
                                                optional: true
                                                value:
                                                  kind: object
                                                  fields:
                                                    name:
                                                      kind: path
                                                      path: input.name
                                                    optional:
                                                      kind: when
                                                      condition:
                                                        kind: equals
                                                        left:
                                                          kind: path
                                                          path: input.contract.required
                                                          optional: true
                                                        right:
                                                          kind: literal
                                                          value: false
                                                      then:
                                                        kind: literal
                                                        value: true
                                                      else:
